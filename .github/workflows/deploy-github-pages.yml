name: Deploy Scratch NextGen to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: scratch-nextgen-frontend/frontend/package-lock.json

      - name: Install dependencies
        working-directory: scratch-nextgen-frontend/frontend
        run: npm ci

      - name: Build static app
        working-directory: scratch-nextgen-frontend/frontend
        run: npm run build:github

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: scratch-nextgen-frontend/frontend/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
